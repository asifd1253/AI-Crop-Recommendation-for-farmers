{% extends "base.html" %} {% load static %}
<title>{% block title %}Admin Dashboard{% endblock %}</title>
{% block content %}
<div>
  <h3 class="mb-3"><i class="fas fa-user-cog"></i> Admin Dashboard</h3>
  <div class="row g-4 mb-4">
    <div class="col-md-6">
      <div class="card shadow-sm border-0">
        <div
          class="card-body d-flex justify-content-between align-items-center"
        >
          <div>
            <p class="fs-6">Users</p>
            <div class="h3">{{total_users}}</div>
          </div>
          <span><i class="fas fa-users fa-2xl text-success"></i></span>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card shadow-sm border-0">
        <div
          class="card-body d-flex justify-content-between align-items-center"
        >
          <div>
            <p class="fs-6">Predictions</p>
            <div class="h3">{{total_predictions}}</div>
          </div>
          <span><i class="fas fa-seedling fa-2xl text-success"></i></span>
        </div>
      </div>
    </div>
  </div>
  <div class="row g-4 mb-4">
    <div class="col-md-6">
      <div class="card shadow-sm border-0" style="height: 350px">
        <h5 class="mb-3">
          <i class="fas fa-chart-column fa-lg text-success"></i> Top Crops
        </h5>
        <canvas id="cropBar"> </canvas>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card shadow-sm border-0" style="height: 350px">
        <h5 class="mb-3">
          <i class="fas fa-chart-line fa-lg text-success"></i> Prediction Trends
        </h5>
        <canvas id="dayLine"> </canvas>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
<script>
  const cropLabels = {{crop_labels_json|safe}};
  const cropCounts = {{crop_counts_json|safe}};
  const dayLabels = {{day_labels_json|safe}};
  const dayCounts = {{day_counts_json|safe}};

  const makeOrReplaceChart = (canvasId, config)=>{
      const existing = Chart.getChart(canvasId);
      if(existing) existing.destroy();

      const canvas = document.getElementById(canvasId);
      if(!canvas) return null;
      return new Chart(canvas,config);
  }

  makeOrReplaceChart("cropBar",{
    type:'bar',
    data:{
        labels: cropLabels,
        datasets:[
            {
                label:'Count',
                data:cropCounts,
                backgroundColor:'rgba(75, 192, 192, 0.7)',
                borderColor:'rgba(75, 192, 192, 1)',
                borderWidth:1
            }
        ]
    }
  })
  makeOrReplaceChart("dayLine",{
    type:'line',
    data:{
        labels: dayLabels,
        datasets:[
            {
                label:'Predictions',
                data:dayCounts,
                backgroundColor:'rgba(75, 192, 192, 0.7)',
                borderColor:'rgba(75, 192, 192, 1)',
                borderWidth:1,
                fill:true
            }
        ]
    }
  })
</script>

{% endblock %}
