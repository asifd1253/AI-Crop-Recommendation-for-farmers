{% extends "base.html" %} {% load static %}
<title>{% block title %}Change Password{% endblock %}</title>
{% block content %}
<div>
  <div class="row g-4">
    <div class="col-lg-5">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h3 class="mb-3">
            <i class="fa-solid fa-passport"></i> Change Password
          </h3>
          <form action="" method="post" id="pwdForm">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Mail</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fa-solid fa-envelope"></i
                ></span>
                <input
                  type="text"
                  name="email"
                  class="form-control"
                  value="{{profile.user.username}}"
                />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Old Password</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fa-solid fa-key"></i
                ></span>
                <input
                  type="password"
                  name="old_password"
                  class="form-control"
                  value="{{old_password}}"
                />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fa-solid fa-shield-halved"></i
                ></span>
                <input
                  type="password"
                  name="new_password"
                  class="form-control"
                  value="{{new_password}}"
                />
              </div>
            </div>

            <button class="btn btn-success mt-3 w-100" id="pwdBtn">
              <span><i class="fa-solid fa-rotate"></i> Change Password</span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
